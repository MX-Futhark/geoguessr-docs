        <style>
            body {
                font-family: sans-serif;
            }

            .hidden {
                display: none !important;
            }

            button.active {
                border: 2px solid black;
                border-radius: 4px;
            }

            main > div {
                margin-top: 20px;
            }

            fieldset > div {
                display: inline-block;
            }

            #tree-view {
                display: flex;
                flex-direction: row;
            }

            #tree-wrapper {
                flex-basis: 30%;
            }

            #tree-controls {
                flex-basis: 70%;
            }

            #table-view {
                margin: 20px;
            }

            .table-label {
                display: inline-block;
                margin-top: 20px;
            }

            .tree {
                --spacing: 1rem;
                margin: 0;
                padding-left: 0;
            }

            .tree li {
                display: block;
                position: relative;
                padding-left: calc(var(--spacing) - 1px);
            }

            .tree ul {
                margin-left: calc(- var(--spacing));
                padding-left: 0;
            }

            .tree ul li {
                border-left: 1px solid black;
                margin-left: 4px;
            }

            .tree ul li:last-child {
                border-color: transparent;
            }

            .tree ul li::before {
                content: '';
                display: block;
                position: absolute;
                top: calc(- var(--spacing));
                left: -1px;
                width: calc(var(--spacing) - 6px);
                height: calc(var(--spacing) - 6px);
                border: solid black;
                border-width: 0 0 1px 1px;
            }

            .tree .container {
                position: relative;
            }

            .tree .node-label {
                background-color: white;
            }

            .tree .node-label::after {
                content: '\00a0';
            }

            .tree .node-value {
                position: absolute;
                width: 100%;
                right: 40px;
                text-align: right;
            }

            .tree .node-value::before {
                content: '\00a0';
                position: absolute;
                top: calc(var(--spacing) / -2);
                width: calc(100% - 40px);
                right: 0;
                border-bottom: 1px dotted black;
                z-index: -1;
            }

            .tree .node-value::after {
                content: '\00a0' attr(data-value);
                color: transparent;
                display: inline-block; /* avoids display issues for dependent vowels on Chromium */
                background-color: white;
                position: absolute;
                right: 0;
                text-align: right;
                z-index: -1;
            }

            table,
            th,
            td {
                border: 1px solid black;
                border-collapse: collapse;
            }

            th,
            td {
                padding: 2px;
            }

            table ul {
                list-style-type: none;
                margin: 0;
                padding: 0;
            }

            table li {
                display: inline-block;
            }

            th {
                background-color: #ddd;
            }
        </style>
    </head>

        <script>
            const LOCAL_STORAGE_KEY = 'brahmi-script-comparator';

            function getFullStorage() {
                return JSON.parse(localStorage.getItem(LOCAL_STORAGE_KEY) ?? '{}');
            }

            function setFullStorage(content) {
                localStorage.setItem(LOCAL_STORAGE_KEY, JSON.stringify(content));
            }

            function getStorageValue(key, defaultValue) {
                return getFullStorage()[key] ?? defaultValue;
            }

            function setStorageValue(key, value) {
                setFullStorage({ ...getFullStorage(), [key]: value });
            }

            function parseHtml(html) {
                const container = document.createElement('div');
                container.innerHTML = html;
                return container.firstElementChild;
            }

            function makeTreeNode(node) {
                const item = parseHtml('<li><div class="container"><span class="node-label"></span></div></li>');
                const container = item.querySelector('.container');
                item.querySelector('.node-label').innerText = node.label;

                if (node.value) {
                    const nodeValue = parseHtml('<span class="node-value"></span>');
                    nodeValue.innerText = nodeValue.dataset.value = node.value;
                    container.appendChild(nodeValue);
                }

                if ((node.children ?? []).length === 0) return item;

                const list = document.createElement('ul');
                container.appendChild(list);
                for (const child of node.children) {
                    list.appendChild(makeTreeNode(child));
                }
                return item;
            }

            function makeTree(tree) {
                const root = parseHtml('<ul class="tree"></ul>');
                root.appendChild(makeTreeNode(tree));
                return root;
            }

            function buildLanguageSelector({ id, includeISO, defaultValue, changeListener }) {
                const languages = Object.keys(data.consonants.ka);
                const selector = parseHtml(`
                    <select class="languages">
                        ${includeISO ? '<option value="">ISO romanization</option>' : ''}
                        ${languages.map((language) => `<option value="${language}">${language}</option>`).join('')}
                    </select>
                `);
                selector.id = id;
                selector.value = getStorageValue(id, defaultValue ?? '');
                selector.addEventListener('change', (e) => {
                    changeListener(e);
                    setStorageValue(id, selector.value);
                });
                return selector;
            }

            function buildTreeViewSelector(treeView) {
                return buildLanguageSelector({
                    id: 'tree-view-selector',
                    includeISO: true,
                    changeListener: (e) => {
                        fillTreeViewButtons(treeView, e.target.value);
                    },
                });
            }

            function fillTables(view, makeElement) {
                for (const table of view.querySelectorAll('table')) {
                    for (const cell of table.querySelectorAll('[data-value]')) {
                        makeElement({
                            table,
                            cell,
                            value: cell.dataset.value,
                            chars: data[table.dataset.content][cell.dataset.value],
                        });
                    }
                }
            }

            function fillTreeViewButtons(treeView, language) {
                let defaultActiveTarget;
                fillTables(treeView, ({ table, cell, value, chars }) => {
                    defaultActiveTarget ??= value;
                    const previousButton = cell.firstElementChild;
                    const button = document.createElement('button');
                    button.innerText = formatChars(chars[language], value);
                    button.addEventListener('click', () => {
                        for (const otherButton of document.querySelectorAll('button')) {
                            otherButton.classList.remove('active');
                        }
                        for (const nodeValue of document.querySelectorAll('.tree .node-value')) {
                            const nodeLanguage = nodeValue.previousElementSibling.innerText;
                            nodeValue.innerText = nodeValue.dataset.value = formatChars(chars[nodeLanguage]);
                        }
                        button.classList.add('active');
                        setStorageValue('table-button', value);
                    });
                    if (previousButton?.classList.contains('active')) button.classList.add('active');
                    button.setAttribute('title', value);

                    cell.innerHTML = '';
                    cell.appendChild(button);
                });
                const activeTarget = getStorageValue('table-button', defaultActiveTarget);
                document.querySelector(`#tree-view [data-value="${activeTarget}"] button`).click();
            }

            function fillTableView(tableView, language1, language2) {
                fillTables(tableView, ({ cell, value, chars }) => {
                    cell.innerHTML = `<table>
                        <tr><td>${formatChars(chars[language1])}</td></tr>
                        <tr><td>${formatChars(chars[language2])}</td></tr>
                    </table>`;
                    cell.firstElementChild.setAttribute('title', value);
                });
            }

            function formatChars(chars, defaultValue = 'вҲ…') {
                return transformIndependentVowelForDisplay(chars?.join(' / ') || defaultValue);
            }

            function transformIndependentVowelForDisplay(vowel) {
                // Firefox fails to apply Indic diacritics to characters of a different script
                // and displays its own dotted circle instead.
                // Chrome has the same issue in specific cases that we avoid in other ways,
                // but also fails to display a dotted circle outside of these cases
                // so we canвҖҷt unify the fix across browsers.
                if (!/Firefox\/[^ ]+$/.test(navigator.userAgent)) return vowel;
                return /(\p{General_Category=Spacing_Mark}|\p{General_Category=Nonspacing_Mark})/u.test(vowel) &&
                    !/(\p{Script=Thai}|\p{Script=Lao})/u.test(vowel)
                    ? vowel.replace('в—Ң', '')
                    : vowel;
            }

            function showView(displayed, views) {
                for (const view of views) {
                    view.classList.add('hidden');
                }
                displayed.classList.remove('hidden');
            }

            function setupViewSwitch(radioName, views) {
                const radios = [...document.querySelectorAll(`[name="${radioName}"]`)];
                radios.forEach((radio, index) => {
                    radio.addEventListener('change', (e) => {
                        showView(views[index], views);
                        setStorageValue(radioName, radio.value);
                    });
                });
                showView(views[0], views);
                const activeRadio = getStorageValue(radioName, radios[0].value);
                document.querySelector(`[name="${radioName}"][value="${activeRadio}"]`).click();
            }

            function makeTreeView() {
                const treeView = document.getElementById('tree-view');
                const treeWrapper = document.getElementById('tree-wrapper');
                const treeControls = document.getElementById('tree-controls');

                const treeViewSelector = buildTreeViewSelector(treeView);
                const simplifiedTreeNode = makeTree(simplifiedTree);
                const completeTreeNode = makeTree(completeTree);
                for (const treeNode of [simplifiedTreeNode, completeTreeNode]) {
                    treeNode.classList.add('hidden');
                    treeWrapper.appendChild(treeNode);
                }
                setupViewSwitch('tree-choice', [simplifiedTreeNode, completeTreeNode]);
                treeControls.appendChild(treeViewSelector);
                treeControls.appendChild(document.createElement('br'));
                treeControls.appendChild(document.importNode(document.getElementById('tables').content, true));
                fillTreeViewButtons(treeView, treeViewSelector.value);

                return treeView;
            }

            function makeTableView() {
                const tableView = document.getElementById('table-view');
                const updateTableView = () =>
                    fillTableView(tableView, tableViewSelectors[0].value, tableViewSelectors[1].value);
                const tableViewSelectors = ['Devanagari', 'Gujarati'].map((language, index) => {
                    const tableViewSelector = buildLanguageSelector({
                        id: `table-view-selector-${index + 1}`,
                        includeISO: false,
                        defaultValue: language,
                        changeListener: updateTableView,
                    });
                    tableView.appendChild(tableViewSelector);
                    tableView.appendChild(document.createElement('br'));
                    return tableViewSelector;
                });
                tableView.appendChild(document.importNode(document.getElementById('tables').content, true));
                updateTableView();

                return tableView;
            }

            setupViewSwitch('view-choice', [makeTreeView(), makeTableView()]);
        </script>
        <script>
            // Scraper for https://en.wikipedia.org/w/index.php?title=Brahmic_scripts&oldid=1346238697
            function scrape() {
                var langs = [
                    'Gurmukhi',
                    'Devanagari',
                    'Gujarati',
                    'Bengali-Assamese',
                    'Odia',
                    'Tibetan',
                    'Tamil',
                    'Malayalam',
                    'Sinhala',
                    'Khmer',
                    'Thai',
                    'Lao',
                    'Telugu',
                    'Kannada',
                ];
                var findTable = (sectionId) => {
                    let currentElement = document.getElementById(sectionId).parentElement.nextElementSibling;
                    let table;
                    while (!currentElement.classList.contains('mw-heading')) {
                        if (currentElement.tagName.toLowerCase() === 'table') return currentElement;
                        table = currentElement.querySelector('table');
                        if (table) return table;
                        currentElement = currentElement.nextElementSibling;
                    }
                };
                var getLangIndex = (table, lang) =>
                    [...table.querySelectorAll('tbody th:nth-of-type(1)')].findIndex(
                        (el) =>
                            el.innerText
                                .replace(/\s/g, '')
                                .replace(/\[.\]$/, '')
                                .replace('вҖ“', '-') === lang,
                    );
                var extractData = (sectionId, headerSelector, offset) => {
                    const table = findTable(sectionId);
                    const langIndices = langs.reduce(
                        (acc, lang) => ({ ...acc, [lang]: getLangIndex(table, lang) }),
                        {},
                    );
                    return [...table.querySelector(headerSelector).querySelectorAll('th')].slice(offset).reduce(
                        (acc, e, index) => ({
                            ...acc,
                            [e.innerText]: Object.entries(langIndices).reduce(
                                (acc, [key, value]) => ({
                                    ...acc,
                                    [key]: (() => {
                                        if (value === -1) return [];
                                        const charEl = table.querySelectorAll(`tr:nth-of-type(${value + 1}) td`)[index];
                                        const txt = charEl.innerText.trim();
                                        if (!txt || !!charEl.getAttribute('style')) return [];
                                        return txt
                                            .replace(/\(|\)|\[.\]/g, '')
                                            .split(/\s+|,|\//)
                                            .map((char) => char.trim());
                                    })(),
                                }),
                                {},
                            ),
                        }),
                        {},
                    );
                };
                var replaceKeys = (o, regexp, replacement) => {
                    Object.keys(o).forEach((key) => {
                        const before = o[key];
                        delete o[key];
                        o[key.replace(regexp, replacement)] = before;
                    });
                };
                var cleanupVowelData = (data) => {
                    const dependentKeys = Object.keys(data).filter((key) => key.startsWith('-'));
                    const baseLetters = { ...data['-a'] };
                    for (const key of dependentKeys) {
                        data[key] = Object.entries(data[key]).reduce(
                            (acc, [key, value]) => ({
                                ...acc,
                                [key]: value.map((cluster) => cluster.replace(baseLetters[key][0].charAt(0), 'в—Ң')),
                            }),
                            {},
                        );
                    }
                };
                var result = {
                    consonants: extractData('Consonants', 'thead tr', 1),
                    vowels: extractData('Vowels', 'tbody tr:nth-of-type(2)', 0),
                    numerals: extractData('Numerals', 'tbody tr:nth-of-type(1)', 1),
                };
                replaceKeys(result.consonants, 'pha/fa', 'pha');
                replaceKeys(result.vowels, /^k(.*)$/, (_, captured) => `-${captured || 'вҲ…'}`);
                replaceKeys(result.vowels, /(aбёҘ|aб№Ғ)/, (_, captured) => captured.replace('a', ''));
                cleanupVowelData(result.vowels);
                // Manual fixes
                result.consonants['бәҸa'].Telugu = [];
                result.consonants['б№үa'].Telugu = [];
                result.vowels['-вҲ…'].Gujarati = [result.vowels['-вҲ…'].Gujarati[0]];
                return result;
            }
